<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahmad's Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7c3aed, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.6rem;
      color: #94a3b8;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #1e1e2e;
      border: 1px solid #2d2d42;
      border-radius: 12px;
      padding: 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #7c3aed;
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.25);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .card p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .card .tag {
      display: inline-block;
      margin-top: auto;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      border-radius: 99px;
      background: #2d2d42;
      color: #818cf8;
      width: fit-content;
    }

    footer {
      margin-top: 4rem;
      color: #475569;
      font-size: 0.8rem;
    }

    footer a { color: #64748b; text-decoration: none; }
    footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <header>
    <h1>Ahmad's Projects</h1>
    <p>Interactive tools &amp; visualizations</p>
  </header>

  <div class="grid">
    <a class="card" href="/recursion/">
      <div class="card-icon">🌀</div>
      <h2>RecursiQuest</h2>
      <p>Interactive recursion &amp; algorithm visualizer with step-by-step tracing, call stack view, quizzes, and achievements.</p>
      <span class="tag">React · TypeScript</span>
    </a>

    <!-- Add future project cards here -->
  </div>

  <footer>
    <a href="https://github.com/ahmad081177" target="_blank" rel="noopener">github.com/ahmad081177</a>
  </footer>
</body>
</html>
